<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TV-2 · Nang suat theo cum</title>
<link rel="stylesheet" href="/static/css/tv/shared.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  .hdr-line .lk { font-size: 12px; letter-spacing: .12em; opacity: .75; font-weight: 600; }
  .hdr-line .lv { font-size: 44px; }
  .hdr-line .style { font-size: 15px; margin-top: 3px; }
  .fld .k { font-size: 12px; letter-spacing: .05em; color: rgba(255,255,255,.7); font-weight: 600; }
  .fld .v { font-size: 26px; }
  .fld .v.demand { font-size: 22px; color: #DDE7F8; }
  .fld .v.ok { color: #FF8C00; }
  .hdr-clock .date { font-size: 14px; color: rgba(255,255,255,.78); font-weight: 500; }
  .hdr-fields { gap: var(--s-5); }

  .body { flex: 1; min-height: 0; display: grid; grid-template-rows: auto 1fr; gap: var(--s-5); }

  .clusters { display: grid; grid-template-columns: repeat(6, 1fr); gap: var(--s-5); }
  .cl { display: flex; flex-direction: column; padding: var(--s-4); gap: var(--s-2); }
  .cl .cl-name {
    font-size: 15px; font-weight: 700; color: var(--brand-ink);
    line-height: 1.25; min-height: 56px; max-height: 56px; overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .cl .cl-mid { flex: 1; display: flex; align-items: baseline; gap: var(--s-2); }
  .cl .cl-big { font-family: var(--font-mono); font-weight: 700; font-size: 52px; line-height: .9; }
  .cl .cl-unit { font-size: var(--fs-micro); color: var(--ink-3); text-transform: uppercase; letter-spacing: .04em; }
  .cl .cl-chip { align-self: flex-start; }
  .cl .cl-sub { display: flex; justify-content: space-between; align-items: flex-end; padding-top: var(--s-2); border-top: 1px solid var(--divider-2); }
  .cl .cl-sub .l { font-size: 14px; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
  .cl .cl-sub .v { font-family: var(--font-mono); font-weight: 800; font-size: 24px; color: var(--brand-ink); line-height: 1; }

  .chartcard { display: flex; flex-direction: column; min-height: 0; }
  .panel-title {
    margin: var(--s-4) var(--s-6) 0;
    padding: 12px 18px;
    font-family: var(--font-sans);
    font-weight: 800; font-size: 24px; color: #fff;
    background: var(--brand-700);
    border-radius: var(--r-md);
    display: inline-flex; align-items: center;
    letter-spacing: .02em;
  }
  .chart {
    flex: 1; padding: var(--s-4) var(--s-6) var(--s-4);
    display: grid; grid-template-columns: 56px 1fr; grid-template-rows: 1fr 78px;
    min-height: 0;
  }
  .yax {
    grid-column: 1; grid-row: 1;
    display: flex; flex-direction: column-reverse; justify-content: space-between;
    text-align: right; padding-right: var(--s-3);
    font-family: var(--font-mono); font-size: var(--fs-label); color: var(--ink-3);
  }
  .plot {
    grid-column: 2; grid-row: 1; position: relative;
    border-left: 2px solid var(--divider); border-bottom: 2px solid var(--divider);
  }
  .gl { position: absolute; left: 0; right: 0; border-top: 1px dashed var(--divider); }
  .tline { position: absolute; left: 0; right: 0; border-top: 3px dashed #FF8C00; z-index: 4; }
  .tlabel {
    position: absolute; right: 12px; transform: translateY(-50%);
    background: #FF8C00; color: #fff;
    font-size: var(--fs-label); font-weight: 700;
    padding: 4px 12px; border-radius: var(--r-sm);
  }
  .bars {
    position: absolute; inset: 0 18px;
    display: grid; grid-template-columns: repeat(6, 1fr); gap: var(--s-6);
    align-items: end;
  }
  .bw { height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
  .bar-cluster {
    width: 72%; border-radius: 8px 8px 0 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 14px;
    font-family: var(--font-mono); font-weight: 700; font-size: 28px;
    box-shadow: var(--sh-2);
  }
  .bar-main { line-height: 1; }
  .bar-ratio {
    margin-top: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.18);
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: .02em;
    line-height: 1;
  }
  .bar-cluster.pass { background: linear-gradient(180deg, #79D9A6 0%, var(--pass-solid) 100%); color: #0B3D24; }
  .bar-cluster.fail { background: linear-gradient(180deg, #E47C7C 0%, var(--fail-solid) 100%); color: #fff; }
  .xax {
    grid-column: 2; grid-row: 2;
    display: grid; grid-template-columns: repeat(6, 1fr); gap: var(--s-6);
    padding: var(--s-3) 18px 0;
  }
  .xl {
    text-align: center; font-size: 15px; font-weight: 600;
    color: var(--ink); line-height: 1.2;
    white-space: normal; overflow-wrap: anywhere; word-break: break-word;
  }
</style>
</head>
<body class="tv">
<div class="stage-wrap">
<div class="stage" id="stage">
<div class="stage-inner">

  <div class="hdr">
    <div class="hdr-line">
      <span class="lk">To</span>
      <span class="lv" id="h-line">—</span>
      <span class="style"><span id="h-style">—</span> · <span id="h-workers">—</span> LD</span>
    </div>
    <div class="hdr-div"></div>
    <div class="hdr-fields">
      <div class="fld"><span class="k">So don hang</span><span class="v demand mono" id="h-demand">—</span></div>
      <div class="fld"><span class="k">Khach hang / Customer</span><span class="v" id="h-customer">—</span></div>
      <div class="fld"><span class="k">Rai chuyen / First day</span><span class="v mono" id="h-firstday">—</span></div>
      <div class="fld"><span class="k">Lao dong / Workers</span><span class="v mono" id="h-workers2">—</span></div>
      <div class="fld"><span class="k">Muc tieu / Cum</span><span class="v mono ok" id="h-target">—</span></div>
    </div>
    <div class="hdr-clock">
      <span class="date" id="h-date">—</span>
      <span class="time" id="clock">22:00</span>
    </div>
  </div>

  <div class="body">
    <div class="clusters" id="clusters-grid"></div>

    <div class="card chartcard">
      <div class="panel-title">BIỂU ĐỒ THEO DÕI NĂNG SUẤT CỤM</div>
      <div class="chart">
        <div class="yax" id="yax"></div>
        <div class="plot" id="plot"></div>
        <div class="xax" id="xax"></div>
      </div>
    </div>
  </div>

  <div class="ftr">
    <span class="l"><span class="refresh-dot"></span>Cap nhat <span id="ftr-time">—</span> · Auto refresh 5 phut</span>
    <span class="r">TV-2 · Nang suat theo cum cong doan</span>
  </div>

</div>
</div>
</div>

<script>
const INIT_MONO = {{ init_mono | tojson }};
const INIT_DATE = {{ init_date | tojson }};
const REFRESH_MS = 5 * 60 * 1000;

function fit() {
  const s = document.getElementById('stage');
  s.style.transform = 'scale(' + Math.min(innerWidth / 1920, innerHeight / 1080) + ')';
}
fit(); addEventListener('resize', fit);

function fmtNum(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString('vi-VN');
}

function fmtPct(value) {
  if (value == null || Number.isNaN(Number(value))) return '—';
  return `${Math.round(Number(value))}%`;
}

async function loadData() {
  if (!INIT_MONO || !INIT_DATE) {
    alert('Can ?mono=...&date=... tren URL. Mo /tv de config.');
    return;
  }
  const url = `/tv/api/tv2?mono=${encodeURIComponent(INIT_MONO)}&date=${INIT_DATE}`;
  let data;
  try {
    data = await fetch(url).then((r) => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  } catch (e) {
    alert('Loi load data: ' + e.message);
    return;
  }
  render(data);
}

function render(d) {
  const h = d.header;
  document.getElementById('h-line').textContent = 'To ' + h['Tổ'];
  document.getElementById('h-style').textContent = 'Style ' + (h.StyleNo || '—');
  document.getElementById('h-workers').textContent = h.Workers || '—';
  document.getElementById('h-workers2').textContent = h.Workers || '—';
  document.getElementById('h-demand').textContent = h.MaDonKH || '—';
  document.getElementById('h-customer').textContent = h.Customer || '—';
  document.getElementById('h-firstday').textContent = h.FirstHangDate ? h.FirstHangDate.substring(5) : '—';
  document.getElementById('h-target').textContent = fmtNum(h.Target);

  const day = new Date(INIT_DATE);
  const days = ['Chu Nhat', 'Thu Hai', 'Thu Ba', 'Thu Tu', 'Thu Nam', 'Thu Sau', 'Thu Bay'];
  document.getElementById('h-date').textContent =
    days[day.getDay()] + ' · ' + day.getDate() + '-' + (day.getMonth() + 1) + '-' + day.getFullYear();
  document.getElementById('ftr-time').textContent = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

  const cgrid = document.getElementById('clusters-grid');
  cgrid.innerHTML = d.clusters.map((c) => `
    <div class="card cl">
      <div class="cl-name" title="${c.Label.replace(/"/g, '&quot;')}">${c.Label}</div>
      <div class="cl-mid">
        <span class="cl-big ${c.Pass ? 'c-pass' : 'c-fail'}">${fmtNum(c.QtyToday)}</span>
        <span class="cl-unit">sp<br>/ngay</span>
      </div>
      <span class="cl-chip pct-chip ${c.Pass ? 'fill-pass' : 'fill-fail'}">${c.Pass ? 'DAT' : 'CHUA DAT'}</span>
      <div class="cl-sub">
        <span class="l">Luy ke</span>
        <span class="v">${fmtNum(c.Cumulative)}</span>
      </div>
    </div>
  `).join('');

  const yMax = d.y_max;
  const ySteps = [0, Math.round(yMax / 3), Math.round(yMax * 2 / 3), yMax];
  document.getElementById('yax').innerHTML = ySteps.map((s) => `<span>${fmtNum(s)}</span>`).join('');

  const plot = document.getElementById('plot');
  const targetPct = (d.target / yMax) * 100;
  let html = '';
  for (const pct of [0, 33.3, 66.6, 100]) {
    html += `<div class="gl" style="bottom:${pct}%"></div>`;
  }
  html += `<div class="tline" style="bottom:${targetPct}%">
             <span class="tlabel">MUC TIEU ${fmtNum(d.target)}</span>
           </div>`;
  html += '<div class="bars">';
  for (const c of d.clusters) {
    const barPct = Math.min((c.QtyToday / yMax) * 100, 100);
    const cls = c.Pass ? 'pass' : 'fail';
    const ratio = d.target > 0 ? (c.QtyToday / d.target) * 100 : null;
    html += `<div class="bw">
               <div class="bar-cluster ${cls}" style="height:${barPct}%">
                 <div class="bar-main">${fmtNum(c.QtyToday)}</div>
                 <div class="bar-ratio">${fmtPct(ratio)}</div>
               </div>
             </div>`;
  }
  html += '</div>';
  plot.innerHTML = html;

  document.getElementById('xax').innerHTML = d.clusters.map((c) =>
    `<div class="xl" title="${c.Label.replace(/"/g, '&quot;')}">${c.Label}</div>`
  ).join('');
}

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
